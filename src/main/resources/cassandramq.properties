# -----------------------------
# Cassandra connection settings
# -----------------------------
cassandramq.cassandra.secure-connect-bundle-path=
cassandramq.cassandra.client-id=
cassandramq.cassandra.client-secret=
cassandramq.cassandra.connect-timeout-ms=5000
cassandramq.cassandra.request-timeout-ms=3000
cassandramq.cassandra.max-requests-per-connection=1024
cassandramq.cassandra.ssl-enabled=false

# -----------------------------
# Queue partitioning and leasing
# -----------------------------
cassandramq.queue.total-shards=512
cassandramq.queue.bucket-size-seconds=10
cassandramq.queue.default-queue=default
cassandramq.queue.worker-id=local-worker
cassandramq.queue.max-owned-shards=512
cassandramq.queue.target-owned-shards=256
cassandramq.queue.shard-lease-duration-seconds=30
cassandramq.queue.shard-lease-renew-interval-seconds=10
cassandramq.queue.shard-rebalance-interval-seconds=30

# -----------------------------
# Polling and claim behavior
# -----------------------------
cassandramq.poll.interval-ms=100
cassandramq.poll.batch-size=200
cassandramq.poll.max-buckets-per-shard=2
cassandramq.poll.pause-inflight-threshold-percent=90
cassandramq.claim.task-lease-duration-seconds=30
cassandramq.claim.max-claim-attempts-per-cycle=1000

# -----------------------------
# Execution pool
# -----------------------------
cassandramq.execution.thread-pool-size=64
cassandramq.execution.max-inflight-tasks=10000
cassandramq.execution.shutdown-wait-seconds=30

# -----------------------------
# Retry policy
# -----------------------------
cassandramq.retry.max-attempts=10
cassandramq.retry.backoff-sequence=PT1S,PT5S,PT30S,PT5M
cassandramq.retry.jitter-percent=10

# -----------------------------
# Metrics and observability
# -----------------------------
cassandramq.metrics.enabled=true
cassandramq.metrics.prometheus-enabled=true
cassandramq.metrics.namespace=cassandramq
cassandramq.metrics.lag-scan-interval-seconds=15

# -----------------------------
# Operational safeguards
# -----------------------------
cassandramq.runtime.startup-acquire-timeout-seconds=20
cassandramq.runtime.health-check-interval-seconds=10
cassandramq.runtime.enable-lease-recovery=true
cassandramq.runtime.recovery-lookback-buckets=6
